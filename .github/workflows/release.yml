name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build & Publish Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Package release archive
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          tar czf "ytome-${VERSION}.tar.gz" \
            dist/ \
            package.json \
            package-lock.json \
            .env.example \
            LICENSE \
            README.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: ytome-*.tar.gz
